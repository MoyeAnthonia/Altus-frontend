<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 26" shape-rendering="crispEdges">
  <!-- Standing dino, rebuilt as flat pixel-art rects to match DinoRunGameEngine's canvas sprite -->
  <g fill="#4ade80">
    <rect x="4" y="4" width="12" height="12" />   <!-- torso -->
    <rect x="10" y="0" width="9" height="9" />     <!-- head -->
    <rect x="0" y="8" width="6" height="4" />      <!-- tail upper -->
    <rect x="1" y="6" width="4" height="4" />      <!-- tail tip -->
    <rect x="17" y="3" width="3" height="4" />     <!-- snout -->
    <rect x="14" y="9" width="3" height="2" />     <!-- arm nub -->
    <rect x="6" y="16" width="4" height="9" />     <!-- left leg -->
    <rect x="6" y="23" width="5" height="2" />     <!-- left foot -->
    <rect x="12" y="16" width="4" height="6" />    <!-- right leg -->
    <rect x="11" y="20" width="5" height="2" />    <!-- right foot -->
  </g>
  <g fill="#16a34a">
    <rect x="4" y="14" width="12" height="2" />    <!-- torso shade -->
    <rect x="10" y="7" width="9" height="2" />     <!-- head shade -->
    <rect x="4" y="4" width="2" height="12" />     <!-- torso left shade -->
    <rect x="6" y="16" width="1" height="6" />     <!-- left leg shade -->
    <rect x="12" y="16" width="1" height="6" />    <!-- right leg shade -->
  </g>
  <rect x="19" y="6" width="2" height="1" fill="#16a34a" /> <!-- nostril -->
  <rect x="15" y="2" width="2" height="2" fill="#0f172a" /> <!-- eye -->
  <rect x="15" y="2" width="1" height="1" fill="#ffffff" /> <!-- eye shine -->
</svg>
