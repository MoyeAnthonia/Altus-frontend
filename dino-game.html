<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Run</title>
<style>
  @font-face {
    font-family: 'Press Start 2P';
    src: url(https://fonts.gstatic.com/s/pressstart2p/v15/e3t4euO8T-267oIAQAu6jDQyK3nVivM.woff2) format('woff2');
    font-display: block;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: "Press Start 2P", monospace;
  }
  #game-container {
    border: 3px solid #e2e8f0;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(100,200,255,0.15);
    line-height: 0;
  }
  canvas { display: block; background: #0f172a; }
  #info {
    color: #94a3b8;
    font-size: 13px;
    margin-top: 12px;
    letter-spacing: 1px;
  }
  #info span { color: #e2e8f0; }
</style>
</head>
<body>
<div id="game-container"><canvas id="game" width="800" height="300"></canvas></div>
<div id="info">SPACE / &uarr; to jump &nbsp;|&nbsp; Score +1 per cactus cleared</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 800, H = 300;
const GROUND_Y = H - 8;
const GRAVITY = 1800;
const JUMP_VEL = -700;
const INITIAL_SPEED = 350;
const MAX_SPEED = 900;
const FONT = '"Press Start 2P", monospace';

const C = {
  bg:     '#0f172a',
  ground: '#334155',
  dino:   '#38bdf8',
  dead:   '#e74c3c',
  cactus: '#4ade80',
  cloud:  '#1e293b',
  star:   '#475569',
};

// ── State machine ────────────────────────────────────────────────────────
class StateMachine {
  static STATES = {
    IDLE: 'IDLE', DIFFICULTY: 'DIFFICULTY', CALIBRATING: 'CALIBRATING',
    ACTIVE: 'ACTIVE', PAUSED: 'PAUSED', GAME_OVER: 'GAME_OVER', WIN: 'WIN',
  };
  static TRANSITIONS = {
    IDLE:        ['DIFFICULTY'],
    DIFFICULTY:  ['CALIBRATING', 'ACTIVE', 'IDLE'],
    CALIBRATING: ['ACTIVE', 'IDLE'],
    ACTIVE:      ['PAUSED', 'GAME_OVER', 'WIN'],
    PAUSED:      ['ACTIVE', 'GAME_OVER', 'IDLE'],
    GAME_OVER:   ['IDLE'],
    WIN:         ['IDLE'],
  };
  constructor(initial = 'IDLE') { this.current = initial; this._listeners = {}; }
  is(state) { return this.current === state; }
  canTransition(to) { return StateMachine.TRANSITIONS[this.current]?.includes(to) ?? false; }
  transition(to) {
    if (!this.canTransition(to)) { console.warn(`Invalid transition: ${this.current} → ${to}`); return false; }
    const from = this.current;
    this.current = to;
    (this._listeners[to] || []).forEach(cb => cb(from));
    return true;
  }
  on(state, cb) { (this._listeners[state] ??= []).push(cb); }
}

const DIFFICULTIES = {
  easy:         { label: 'Easy',         repGoal: 10,       speed: 350, color: '#4ade80' },
  medium:       { label: 'Medium',       repGoal: 20,       speed: 350, color: '#38bdf8' },
  hard:         { label: 'Hard',         repGoal: 40,       speed: 350, color: '#fbbf24' },
  score_attack: { label: 'Score Attack', repGoal: Infinity, speed: 350, color: '#e74c3c' },
};

// ── Helpers ──────────────────────────────────────────────────────────────
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function pick(arr) { return arr[randInt(0, arr.length - 1)]; }

function drawText(text, x, y, size, color, align = 'left', baseline = 'top') {
  ctx.font = `${size}px ${FONT}`;
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.textBaseline = baseline;
  ctx.fillText(text, x, y);
}

function drawRect(x, y, w, h, color, strokeColor, strokeWidth) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
  if (strokeColor) {
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = strokeWidth || 2;
    ctx.strokeRect(x + ctx.lineWidth / 2, y + ctx.lineWidth / 2, w - ctx.lineWidth, h - ctx.lineWidth);
  }
}

// ── Sprite drawing (pixel-block sprites, mirrors original Phaser textures) ─
function drawDino(x, y, frame, ducking, dead) {
  // x,y = top-left of bounding box
  ctx.fillStyle = dead ? C.dead : C.dino;
  if (ducking) {
    ctx.fillRect(x + 4, y + 10, 30, 14);
    ctx.fillRect(x + 26, y + 2, 14, 12);
    ctx.fillRect(x + 0, y + 14, 8, 6);
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(x + 34, y + 4, 3, 3);
    ctx.fillStyle = dead ? C.dead : C.dino;
    if (frame === 0) { ctx.fillRect(x + 10, y + 24, 6, 8); ctx.fillRect(x + 22, y + 24, 6, 4); }
    else              { ctx.fillRect(x + 10, y + 24, 6, 4); ctx.fillRect(x + 22, y + 24, 6, 8); }
  } else {
    ctx.fillRect(x + 8, y + 4, 22, 20);
    ctx.fillRect(x + 22, y + 0, 14, 14);
    ctx.fillRect(x + 0, y + 14, 10, 6);
    ctx.fillRect(x + 2, y + 10, 6, 6);
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(x + 30, y + 3, 3, 3);
    if (!dead) ctx.fillRect(x + 33, y + 9, 4, 2);
    if (!dead) ctx.fillRect(x + 22, y + 12, 6, 4);
    ctx.fillStyle = dead ? C.dead : C.dino;
    if (dead) {
      ctx.fillRect(x + 12, y + 24, 6, 12); ctx.fillRect(x + 24, y + 24, 6, 12);
    } else if (frame === 0) {
      ctx.fillRect(x + 12, y + 24, 6, 12); ctx.fillRect(x + 24, y + 24, 6, 8);
    } else {
      ctx.fillRect(x + 12, y + 24, 6, 8);  ctx.fillRect(x + 24, y + 24, 6, 12);
    }
  }
}

function drawCactus(x, bottomY, type) {
  ctx.fillStyle = C.cactus;
  if (type === 'sm') {
    ctx.fillRect(x + 10, bottomY - 40, 10, 40);
    ctx.fillRect(x + 0, bottomY - 30, 10, 8); ctx.fillRect(x + 0, bottomY - 34, 12, 6);
    ctx.fillRect(x + 20, bottomY - 26, 10, 8); ctx.fillRect(x + 18, bottomY - 30, 12, 6);
  } else if (type === 'tall') {
    ctx.fillRect(x + 14, bottomY - 56, 12, 56);
    ctx.fillRect(x + 0, bottomY - 44, 14, 10); ctx.fillRect(x + 0, bottomY - 50, 16, 8);
    ctx.fillRect(x + 26, bottomY - 38, 14, 10); ctx.fillRect(x + 24, bottomY - 44, 16, 8);
  } else { // dbl
    ctx.fillRect(x + 6, bottomY - 36, 8, 36); ctx.fillRect(x + 0, bottomY - 26, 6, 6); ctx.fillRect(x + 14, bottomY - 22, 6, 6);
    ctx.fillRect(x + 26, bottomY - 36, 8, 36); ctx.fillRect(x + 20, bottomY - 26, 6, 6); ctx.fillRect(x + 34, bottomY - 22, 6, 6);
  }
}

function cactusDims(type) {
  if (type === 'sm')   return { w: 30, h: 40 };
  if (type === 'tall') return { w: 40, h: 56 };
  return { w: 40, h: 36 }; // dbl
}

function drawCloud(x, y) {
  ctx.fillStyle = C.cloud;
  ctx.fillRect(x + 12, y + 12, 60, 16);
  ctx.fillRect(x + 20, y + 4, 24, 12);
  ctx.fillRect(x + 8, y + 8, 20, 10);
  ctx.fillRect(x + 48, y + 8, 16, 10);
}

// ── Game object ──────────────────────────────────────────────────────────
class Game {
  constructor() {
    this.sm = new StateMachine('IDLE');
    this.sm.on('DIFFICULTY',  () => this.onDifficulty());
    this.sm.on('CALIBRATING', () => this.onCalibrating());
    this.sm.on('ACTIVE',      () => this.onActive());
    this.sm.on('PAUSED',      () => this.onPaused());
    this.sm.on('GAME_OVER',   () => this.onGameOver());
    this.sm.on('WIN',         () => this.onWin());
    this.sm.on('IDLE',        () => this.onIdle());

    this.keys = {};
    window.addEventListener('keydown', (e) => this.handleKeyDown(e));
    window.addEventListener('keyup',   (e) => { this.keys[e.code] = false; });
    canvas.addEventListener('mousedown', () => this.handleJump());

    this.reset();
    this.lastTime = performance.now();
    requestAnimationFrame((t) => this.loop(t));
  }

  reset() {
    this.dino = { x: 80, y: 0, w: 40, h: 36, vy: 0, frame: 0, frameTimer: 0, ducking: false, dead: false };
    this.dinoGroundY = GROUND_Y - this.dino.h;
    this.dino.y = this.dinoGroundY;

    this.obstacles = [];
    this.clouds = [];
    for (let i = 0; i < 4; i++) this.spawnCloud(rand(0, W));
    this.stars = [];
    for (let i = 0; i < 40; i++) {
      this.stars.push({ x: rand(0, W), y: rand(10, GROUND_Y - 80), size: randInt(1, 3), alpha: rand(0.2, 0.7) });
    }

    this.speed = INITIAL_SPEED;
    this.score = 0;
    this.hiScore = this.hiScore || 0;
    this.jumpCount = 0;
    this.scoredIds = new Set();
    this.obstacleTimerId = null;
    this.cloudTimerId = null;
    this.sessionTime = 0;
    this.difficulty = null;
    this.calibratingTimeoutId = null;
  }

  spawnCloud(xOverride) {
    this.clouds.push({ x: xOverride ?? W + 50, y: rand(30, 100), scrollSpeed: rand(0.3, 0.6), alpha: 0.6 });
  }

  spawnObstacle() {
    if (!this.sm.is('ACTIVE')) return;
    const type = pick(['sm', 'sm', 'sm', 'sm', 'tall', 'tall', 'dbl']);
    const dims = cactusDims(type);
    this.obstacles.push({ x: W + 30, type, w: dims.w, h: dims.h, id: Math.random(), scored: false });
    const delay = this.difficulty ? this.difficulty.obstacleDelay ?? 3000 : 3000;
    this.obstacleTimerId = setTimeout(() => this.spawnObstacle(), delay);
  }

  handleKeyDown(e) {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); this.handleJump(); }
    if (e.code === 'ArrowDown') this.keys.down = true;
    if (e.code === 'KeyP') {
      if (this.sm.is('ACTIVE')) this.sm.transition('PAUSED');
      else if (this.sm.is('PAUSED')) this.sm.transition('ACTIVE');
    }
    if (e.code === 'Digit1') this.selectDifficulty('easy');
    if (e.code === 'Digit2') this.selectDifficulty('medium');
    if (e.code === 'Digit3') this.selectDifficulty('hard');
    if (e.code === 'Digit4') this.selectDifficulty('score_attack');
  }

  handleJump() {
    const S = StateMachine.STATES;
    if (this.sm.is(S.IDLE))      { this.sm.transition('DIFFICULTY'); return; }
    if (this.sm.is(S.GAME_OVER)) { this.restart(); return; }
    if (this.sm.is(S.WIN))       { this.restart(); return; }
    if (!this.sm.is(S.ACTIVE))   return;

    const onGround = Math.abs(this.dino.y - this.dinoGroundY) < 4;
    if (onGround) {
      this.jumpCount = 1;
      this.dino.vy = JUMP_VEL;
    } else if (this.jumpCount === 1) {
      this.jumpCount = 2;
      this.dino.vy = JUMP_VEL * 0.85;
    }
  }

  selectDifficulty(key) {
    if (!this.sm.is('DIFFICULTY')) return;
    this.difficulty = DIFFICULTIES[key];
    this.speed = this.difficulty.speed;
    this.sm.transition('CALIBRATING');
  }

  restart() { this.reset(); this.sm.transition('IDLE'); }

  die() {
    if (!this.sm.is('ACTIVE')) return;
    this.sm.transition('GAME_OVER');
  }

  onIdle() { this.difficulty = null; }
  onDifficulty() { /* drawn declaratively in render */ }
  onCalibrating() {
    this.calibratingTimeoutId = setTimeout(() => {
      if (this.sm.is('CALIBRATING')) this.sm.transition('ACTIVE');
    }, 1000);
  }
  onActive() {
    if (!this.obstacleTimerId) this.spawnObstacle();
    if (!this.cloudTimerId) this.cloudTimerId = setInterval(() => this.spawnCloud(), 3500);
  }
  onPaused() {
    if (this.obstacleTimerId) { clearTimeout(this.obstacleTimerId); this.obstacleTimerId = null; }
  }
  onGameOver() {
    this.dino.dead = true;
    if (this.obstacleTimerId) { clearTimeout(this.obstacleTimerId); this.obstacleTimerId = null; }
    if (this.cloudTimerId)    { clearInterval(this.cloudTimerId);   this.cloudTimerId = null; }
    if (this.score > this.hiScore) this.hiScore = this.score;
  }
  onWin() {
    if (this.obstacleTimerId) { clearTimeout(this.obstacleTimerId); this.obstacleTimerId = null; }
    if (this.cloudTimerId)    { clearInterval(this.cloudTimerId);   this.cloudTimerId = null; }
    if (this.score > this.hiScore) this.hiScore = this.score;
  }

  loop(now) {
    const dt = Math.min((now - this.lastTime) / 1000, 0.05);
    this.lastTime = now;
    this.update(dt);
    this.render();
    requestAnimationFrame((t) => this.loop(t));
  }

  update(dt) {
    this.dino.ducking = this.keys.down && this.sm.is('ACTIVE') &&
                         Math.abs(this.dino.y - this.dinoGroundY) < 4;

    if (!this.sm.is('ACTIVE')) return;

    // Physics
    this.dino.vy += GRAVITY * dt;
    this.dino.y += this.dino.vy * dt;
    if (this.dino.y >= this.dinoGroundY) { this.dino.y = this.dinoGroundY; this.dino.vy = 0; this.jumpCount = 0; }

    // Run animation
    this.dino.frameTimer += dt;
    if (this.dino.frameTimer > 0.12) { this.dino.frameTimer = 0; this.dino.frame = 1 - this.dino.frame; }

    // Speed ramp
    this.distance = (this.distance || 0) + this.speed * dt;
    this.speed = Math.min(INITIAL_SPEED + this.distance * 0.04, MAX_SPEED);

    // Move obstacles
    this.obstacles.forEach(o => { o.x -= this.speed * dt; });
    this.obstacles = this.obstacles.filter(o => o.x > -60);

    // Move clouds
    this.clouds.forEach(c => {
      c.x -= this.speed * c.scrollSpeed * dt;
      if (c.x < -90) { c.x = W + 90; c.y = rand(30, 100); }
    });

    // Stars drift
    this.stars.forEach(s => {
      s.x -= 30 * dt;
      if (s.x < 0) { s.x = W; s.y = rand(10, GROUND_Y - 80); }
    });

    // Scoring: count obstacle as cleared once its right edge passes dino's left edge
    const dinoLeft = this.dino.x;
    this.obstacles.forEach(o => {
      if (!o.scored && (o.x + o.w) < dinoLeft) { o.scored = true; this.score += 1; }
    });

    // Win check
    if (this.difficulty && this.score >= this.difficulty.repGoal) { this.sm.transition('WIN'); return; }

    // Collision (AABB) — dino hitbox slightly inset for fairness
    const dpad = 6;
    const dx = this.dino.x + dpad, dy = this.dino.y + dpad;
    const dw = this.dino.w - dpad * 2, dh = (this.dino.ducking ? 32 : this.dino.h) - dpad * 2;
    for (const o of this.obstacles) {
      const ox = o.x, oy = GROUND_Y - o.h, ow = o.w, oh = o.h;
      if (dx < ox + ow && dx + dw > ox && dy < oy + oh && dy + dh > oy) {
        this.die();
        break;
      }
    }

    this.sessionTime += dt;
  }

  render() {
    // Sky
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, W, H);

    // Stars
    this.stars.forEach(s => {
      ctx.globalAlpha = s.alpha;
      ctx.fillStyle = C.star;
      ctx.fillRect(s.x, s.y, s.size, s.size);
    });
    ctx.globalAlpha = 1;

    // Clouds
    this.clouds.forEach(c => {
      ctx.globalAlpha = c.alpha;
      drawCloud(c.x, c.y);
    });
    ctx.globalAlpha = 1;

    // Ground
    drawRect(0, H - 8, W, 8, C.ground);

    // Obstacles
    this.obstacles.forEach(o => drawCactus(o.x, GROUND_Y, o.type));

    // Dino
    const dy = this.dino.ducking ? GROUND_Y - 32 : this.dino.y;
    drawDino(this.dino.x, dy, this.dino.frame, this.dino.ducking, this.dino.dead);

    // HUD
    drawText(`REPS: ${this.score}`, W / 2, 20, 24, '#94a3b8', 'center', 'top');
    drawText(`SCORE: ${this.score * 100}`, W - 20, 20, 14, '#94a3b8', 'right', 'top');

    // Overlays
    const S = StateMachine.STATES;
    if (this.sm.is(S.IDLE)) this.renderIdle();
    if (this.sm.is(S.DIFFICULTY)) this.renderDifficulty();
    if (this.sm.is(S.CALIBRATING)) this.renderCalibrating();
    if (this.sm.is(S.PAUSED)) this.renderPaused();
    if (this.sm.is(S.GAME_OVER)) this.renderGameOver();
    if (this.sm.is(S.WIN)) this.renderWin();
  }

  renderIdle() {
    drawRect(W/2 - 170, H/2 - 60, 340, 100, 'rgba(30,41,59,0.95)', C.dino, 2);
    drawText('DINO RUN', W/2, H/2 - 30, 24, '#38bdf8', 'center', 'middle');
    drawText('PRESS SPACE TO START', W/2, H/2 + 10, 10, '#94a3b8', 'center', 'middle');
  }

  renderDifficulty() {
    drawRect(W/2 - 240, H/2 - 110, 480, 220, 'rgba(15,23,42,0.97)', '#38bdf8', 2);
    drawText('SELECT DIFFICULTY', W/2, H/2 - 82, 16, '#e2e8f0', 'center', 'middle');

    const entries = Object.entries(DIFFICULTIES);
    const btnW = 90, btnH = 44, gap = 14;
    const totalW = entries.length * btnW + (entries.length - 1) * gap;
    const startX = W/2 - totalW/2;
    this._diffButtons = [];

    entries.forEach(([key, diff], i) => {
      const bx = startX + i * (btnW + gap);
      const by = H/2 + 10 - btnH/2;
      drawRect(bx, by, btnW, btnH, '#1e293b', diff.color, 2);
      drawText(diff.label, bx + btnW/2, by + 16, 9, diff.color, 'center', 'middle');
      const goalText = diff.repGoal === Infinity ? '∞' : `${diff.repGoal} reps`;
      drawText(goalText, bx + btnW/2, by + 32, 8, '#475569', 'center', 'middle');
      this._diffButtons.push({ x: bx, y: by, w: btnW, h: btnH, key });
    });

    drawText('OR PRESS  1  2  3  4', W/2, H/2 + 72, 9, '#475569', 'center', 'middle');
  }

  renderCalibrating() {
    drawText('GET READY...', W/2, H/2, 16, '#94a3b8', 'center', 'middle');
  }

  renderPaused() {
    drawRect(W/2 - 110, H/2 - 40, 220, 80, 'rgba(30,41,59,0.97)', '#fbbf24', 2);
    drawText('PAUSED', W/2, H/2 - 10, 18, '#fbbf24', 'center', 'middle');
    drawText('PRESS P TO RESUME', W/2, H/2 + 16, 9, '#94a3b8', 'center', 'middle');
  }

  scoreBreakdown() {
    const repStreak = Math.max(1, this.score * 0.1);
    const timeMult = Math.pow(1.1, Math.floor(this.sessionTime) * 0.1);
    const finalScore = Math.round(this.score * 100 * repStreak * timeMult);
    return { repStreak, timeMult, finalScore, secs: Math.floor(this.sessionTime) };
  }

  renderGameOver() {
    const { repStreak, timeMult, finalScore, secs } = this.scoreBreakdown();
    drawRect(W/2 - 210, H/2 - 110, 420, 220, 'rgba(15,23,42,0.97)', '#e74c3c', 2);
    drawText('GAME OVER', W/2, H/2 - 88, 18, '#e74c3c', 'center', 'middle');

    drawText('Base Score', W/2 - 100, H/2 - 52, 9, '#94a3b8', 'left', 'middle');
    drawText(`${this.score * 100}`, W/2 + 100, H/2 - 52, 9, '#e2e8f0', 'right', 'middle');

    drawText(`Rep Streak (${this.score})`, W/2 - 100, H/2 - 24, 9, '#94a3b8', 'left', 'middle');
    drawText(`x${repStreak.toFixed(1)}`, W/2 + 100, H/2 - 24, 9, '#e2e8f0', 'right', 'middle');

    drawText(`Game Time (${secs}s)`, W/2 - 100, H/2 + 4, 9, '#94a3b8', 'left', 'middle');
    drawText(`x${timeMult.toFixed(2)}`, W/2 + 100, H/2 + 4, 9, '#e2e8f0', 'right', 'middle');

    ctx.strokeStyle = '#334155'; ctx.beginPath();
    ctx.moveTo(W/2 - 180, H/2 + 26); ctx.lineTo(W/2 + 180, H/2 + 26); ctx.stroke();

    drawText('FINAL SCORE', W/2 - 100, H/2 + 48, 10, '#38bdf8', 'left', 'middle');
    drawText(`${finalScore}`, W/2 + 100, H/2 + 48, 10, '#38bdf8', 'right', 'middle');

    drawText('PRESS SPACE TO RETRY', W/2, H/2 + 82, 9, '#475569', 'center', 'middle');
  }

  renderWin() {
    const { repStreak, timeMult, finalScore, secs } = this.scoreBreakdown();
    const diffLabel = this.difficulty?.label || 'Unknown';
    drawRect(W/2 - 210, H/2 - 120, 420, 240, 'rgba(15,23,42,0.97)', '#4ade80', 2);
    drawText('YOU WIN!', W/2, H/2 - 96, 18, '#4ade80', 'center', 'middle');
    drawText(`Difficulty: ${diffLabel}`, W/2, H/2 - 66, 8, '#475569', 'center', 'middle');

    drawText('Base Score', W/2 - 100, H/2 - 36, 9, '#94a3b8', 'left', 'middle');
    drawText(`${this.score * 100}`, W/2 + 100, H/2 - 36, 9, '#e2e8f0', 'right', 'middle');

    drawText(`Rep Streak (${this.score})`, W/2 - 100, H/2 - 8, 9, '#94a3b8', 'left', 'middle');
    drawText(`x${repStreak.toFixed(1)}`, W/2 + 100, H/2 - 8, 9, '#e2e8f0', 'right', 'middle');

    drawText(`Game Time (${secs}s)`, W/2 - 100, H/2 + 20, 9, '#94a3b8', 'left', 'middle');
    drawText(`x${timeMult.toFixed(2)}`, W/2 + 100, H/2 + 20, 9, '#e2e8f0', 'right', 'middle');

    ctx.strokeStyle = '#334155'; ctx.beginPath();
    ctx.moveTo(W/2 - 180, H/2 + 42); ctx.lineTo(W/2 + 180, H/2 + 42); ctx.stroke();

    drawText('FINAL SCORE', W/2 - 100, H/2 + 62, 10, '#4ade80', 'left', 'middle');
    drawText(`${finalScore}`, W/2 + 100, H/2 + 62, 10, '#4ade80', 'right', 'middle');

    drawText('PRESS SPACE TO PLAY AGAIN', W/2, H/2 + 96, 9, '#475569', 'center', 'middle');
  }
}

// ── Mouse click handling for difficulty buttons ─────────────────────────
canvas.addEventListener('click', (e) => {
  if (!game.sm.is('DIFFICULTY') || !game._diffButtons) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX, my = (e.clientY - rect.top) * scaleY;
  for (const b of game._diffButtons) {
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      game.selectDifficulty(b.key);
      break;
    }
  }
});

// ── Boot ─────────────────────────────────────────────────────────────────
let game;
function boot() { game = new Game(); }

if (document.fonts && document.fonts.ready) {
  document.fonts.load('16px "Press Start 2P"').finally(boot);
} else {
  boot();
}
</script>
